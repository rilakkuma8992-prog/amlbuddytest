<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AML Buddy 互動原型 Demo</title>
<style>
  :root{
    --accent:#EE4D2D;
    --accent-dark:#D8401F;
    --ink:#222222;
    --sub:#8a8a8a;
    --line:#ECECEC;
    --bg-page:#EDEEF0;
    --bg-app:#F5F5F5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg-page);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:28px 12px 40px;
    color:var(--ink);
  }
  .page-note{
    max-width:420px;
    width:100%;
    background:#FFF7E6;
    border:1px solid #F5C97A;
    border-radius:10px;
    padding:12px 14px;
    font-size:12.5px;
    line-height:1.6;
    color:#7a5a00;
    margin-bottom:14px;
  }
  .page-note b{color:#a35b00;}
  .phone{
    width:100%;
    max-width:420px;
    height:760px;
    background:var(--bg-app);
    border-radius:26px;
    box-shadow:0 12px 40px rgba(0,0,0,0.18);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
    border:8px solid #1c1c1e;
  }
  .header{
    background:#fff;
    display:flex;
    align-items:center;
    gap:10px;
    padding:14px 14px 12px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .back-btn{
    width:26px;height:26px;
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);
    font-size:20px;
    cursor:pointer;
    visibility:hidden;
    user-select:none;
  }
  .back-btn.show{visibility:visible;}
  .avatar{
    width:32px;height:32px;border-radius:50%;
    background:linear-gradient(135deg,#FF7A50,#EE4D2D);
    display:flex;align-items:center;justify-content:center;
    font-size:17px;flex-shrink:0;
  }
  .title-wrap{display:flex;flex-direction:column;line-height:1.2;}
  .title{font-weight:700;font-size:16px;color:#222;}
  .breadcrumb{font-size:11.5px;color:var(--sub);margin-top:1px;}
  .banner{
    background:#FFF3E0;
    color:#B4530A;
    font-size:12px;
    padding:8px 14px;
    display:flex;align-items:center;gap:6px;
    flex-shrink:0;
  }
  .body{
    flex:1;
    overflow-y:auto;
    padding:14px;
  }
  .hint{
    font-size:13px;
    color:#555;
    margin:2px 4px 12px;
  }
  .card{
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
    margin-bottom:14px;
  }
  .card-title{
    display:flex;align-items:center;gap:6px;
    font-size:14px;font-weight:700;
    padding:12px 14px 8px;
    color:#333;
  }
  .list-item{
    display:flex;align-items:center;justify-content:space-between;
    padding:13px 14px;
    border-top:1px solid var(--line);
    font-size:14px;
    cursor:pointer;
    color:#222;
    transition:background .12s;
  }
  .list-item:first-child{border-top:none;}
  .list-item:hover{background:#FAFAFA;}
  .list-item .chev{color:#C6C6C6;font-size:15px;}
  .biz-grid{
    display:flex;gap:12px;margin-bottom:14px;
  }
  .biz-card{
    flex:1;
    background:#fff;
    border-radius:14px;
    padding:22px 10px;
    text-align:center;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
    border:1.5px solid transparent;
  }
  .biz-card:hover{border-color:var(--accent);color:var(--accent);}
  .biz-card .emo{font-size:26px;display:block;margin-bottom:8px;}
  .bubble-row{
    display:flex;justify-content:flex-end;margin-bottom:10px;
  }
  .bubble-user{
    background:var(--accent);
    color:#fff;
    padding:9px 14px;
    border-radius:14px 14px 2px 14px;
    font-size:13.5px;
    max-width:78%;
  }
  .answer-card{
    background:#fff;
    border-radius:14px 14px 14px 2px;
    padding:14px 15px;
    font-size:14px;
    line-height:1.75;
    box-shadow:0 1px 2px rgba(0,0,0,0.04);
    margin-bottom:10px;
  }
  .answer-ref{
    font-size:11.5px;
    color:var(--sub);
    border-top:1px dashed var(--line);
    margin-top:10px;
    padding-top:8px;
  }
  .cta-btn{
    width:100%;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:12px;
    border-radius:10px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    margin-top:4px;
  }
  .cta-btn:active{background:var(--accent-dark);}
  .cta-secondary{
    width:100%;
    background:#fff;
    color:#555;
    border:1px solid var(--line);
    padding:11px;
    border-radius:10px;
    font-size:13.5px;
    cursor:pointer;
    margin-top:8px;
  }
  .footer{
    flex-shrink:0;
    background:#fff;
    border-top:1px solid var(--line);
    padding:10px 10px 12px;
  }
  .footer-title{
    font-size:11px;color:var(--sub);margin:0 4px 8px;
  }
  .chip-row{
    display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;
    scrollbar-width:none;
  }
  .chip-row::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;
    border:1px solid var(--line);
    color:var(--accent);
    background:#fff;
    padding:8px 13px;
    border-radius:20px;
    font-size:12.5px;
    white-space:nowrap;
    cursor:pointer;
  }
  .chip.contact{
    color:#555;
    display:flex;align-items:center;gap:4px;
    border-color:#ddd;
  }
  .locked-note{
    display:flex;align-items:center;gap:6px;
    font-size:11.5px;
    color:#999;
    background:#F7F7F7;
    border-radius:8px;
    padding:8px 10px;
    margin:2px 4px 14px;
  }
  .modal-mask{
    position:absolute;inset:0;background:rgba(0,0,0,0.4);
    display:flex;align-items:center;justify-content:center;
    z-index:20;
  }
  .modal-box{
    background:#fff;border-radius:14px;padding:20px;width:82%;
    text-align:center;
  }
  .modal-box h4{margin:0 0 8px;font-size:15px;}
  .modal-box p{font-size:13px;color:#555;line-height:1.6;margin:0 0 16px;}
  .modal-close{
    background:var(--accent);color:#fff;border:none;padding:10px 20px;
    border-radius:8px;font-size:13.5px;cursor:pointer;
  }
  .legend{
    max-width:420px;width:100%;margin-top:16px;font-size:12px;color:#777;line-height:1.7;
  }
</style>
</head>
<body>

<div class="page-note">
  這是根據提案文件需求做出的<b>可互動原型（Demo）</b>，資料為<b>假設性範例</b>，實際上線前需替換成貴行真正審核過的內容。
  操作方式：直接用滑鼠點選畫面上的選項即可，<b>本畫面沒有輸入文字的地方</b>（刻意設計，對應原文件「用戶只能點選既有選項」的要求）。
</div>

<div class="phone" id="phone"></div>

<div class="legend">
  對照原文件需求：① 企金/消金 → AML主題 → 問題集 → 解答共四層　② 底下常見問題可跳過分層直達解答　③ 第2~4層皆可返回　④ 純點選無自由輸入　⑤ 解答頁有「重新選擇其他問題」　⑥ 內容完全來自左側資料庫，機器人不生成文字。
</div>

<script>
// ============================================================
// 範例資料庫（正式上線時，此區塊內容應對應 Excel「問答資料庫」工作表的
// 「啟用」列，由平台/工程人員轉換產生，使用者本人完全不需要碰這段程式碼）
// ============================================================
const DB = {
  "企金": {
    "KYC客戶身分辨識": [
      {q:"境外法人客戶開戶，需要準備哪些身分證明文件？",
       a:"境外法人開戶需檢附：1. 公司註冊證明及章程　2. 最新股東名冊/受益所有人資料　3. 負責人身分證明　4. 授權書（如委託代理人辦理）。文件需為近3個月內或有效期內。",
       ref:"OO銀行防制洗錢及打擊資恐內部作業要點 第5條"},
      {q:"客戶為國內公司但主要股東是境外法人，KYC要多做什麼？",
       a:"除一般KYC文件外，需追溯至最終自然人層級，取得境外股東的公司登記文件與受益人資料，並確認該境外股東所在地是否為高風險地區。",
       ref:"客戶審查作業辦法 第9條"}
    ],
    "受益人辨識": [
      {q:"如何判斷客戶的「實質受益人」是誰？",
       a:"實質受益人原則上為直接或間接持有該法人股份或資本超過25%之自然人；若無此人，則辨識對該法人具最終控制權之自然人（如董事長）。",
       ref:"洗錢防制法施行細則 第4條；客戶審查作業辦法 第8條"},
      {q:"受益人資料客戶不願意提供，可以先開戶嗎？",
       a:"不可以。無法完成受益人辨識視同無法完成客戶審查，依規定應婉拒建立業務關係，不得先開戶再補件。",
       ref:"客戶審查作業辦法 第10條"}
    ],
    "制裁名單與PEP政治人物": [
      {q:"開戶時篩檢到客戶姓名與制裁名單「疑似相符」，該怎麼辦？",
       a:"應立即停止該筆開戶/交易流程，於24小時內陳報法遵專責主管進行人工複核，複核前不得撥款或執行交易，並保留篩檢紀錄。",
       ref:"資恐防制法遵循作業要點 第6條"},
      {q:"客戶為現任政府官員的配偶，算不算PEP？",
       a:"政府高階官員的家屬（配偶、子女、父母等）屬「PEP之關係人」，應比照PEP辦理強化審查（EDD），而非一般客戶審查。",
       ref:"高風險客戶名單管理辦法 第5條"}
    ],
    "跨境匯款相關": [
      {q:"海外分行辦理跨境匯款，SWIFT電文欄位資訊不足時可以直接匯出嗎？",
       a:"不可以。匯款人與受款人完整資訊（姓名、帳號、地址等）為監理要求之必要欄位，資訊不完整應先向匯款分行補正，補正前應暫停撥款。",
       ref:"跨境匯款電文資訊規範 第4條"},
      {q:"客戶要求代收款項後立即轉匯給第三人，這樣可以嗎？",
       a:"此類「過水」交易型態風險較高，應先了解交易目的與資金關係，若無合理商業理由，應婉拒承作並評估是否簽報疑似洗錢交易。",
       ref:"疑似洗錢或資恐交易申報作業程序 第5條"}
    ]
  },
  "消金": {
    "疑似洗錢交易通報(STR)": [
      {q:"客戶短期內大額頻繁跨行匯款，需要怎麼處理？",
       a:"請先於系統標記為關注交易，調閱近6個月交易紀錄，確認資金來源與客戶身分背景是否相符；如無法合理說明，應簽報法遵/AML專責人員評估是否申報疑似洗錢交易（STR）。",
       ref:"疑似洗錢或資恐交易申報作業程序 第3條"},
      {q:"學生帳戶忽然出現大筆境外匯入款，要注意什麼？",
       a:"應確認資金來源是否與客戶職業/收入狀況相符（如非獎學金、家人匯款等合理說明），必要時請客戶說明並保留佐證，異常者應通報。",
       ref:"疑似洗錢或資恐交易申報作業程序 第3條"}
    ],
    "高風險客戶與國家": [
      {q:"客戶國籍為高風險地區，可以承作業務嗎？",
       a:"屬本行高風險地區客戶清單者，原則上採取強化審查（EDD），需經法遵單位核准後才能承作，且須每年至少覆審一次。",
       ref:"高風險客戶名單管理辦法 第2、7條"},
      {q:"客戶職業為現金密集行業（如當舖），開戶要加強什麼？",
       a:"現金密集行業客戶應加強了解其資金流程與交易型態合理性，建議調高交易監控頻率，並於首次開戶時說明主要往來對象與資金來源。",
       ref:"高風險客戶名單管理辦法 第9條"}
    ],
    "CDD/EDD客戶審查": [
      {q:"一般客戶跟高風險客戶的審查頻率有什麼不同？",
       a:"一般客戶原則上每3年覆審一次；高風險客戶（含PEP、高風險地區客戶等）應每年至少覆審一次，且覆審內容需包含資金來源合理性重新確認。",
       ref:"客戶審查作業辦法 第14條"},
      {q:"客戶不願說明資金來源，該如何處理？",
       a:"客戶審查程序中資金來源說明為必要項目，客戶拒絕提供時應婉拒建立/繼續業務關係，並視情節評估是否申報疑似洗錢交易。",
       ref:"客戶審查作業辦法 第11條"}
    ]
  }
};

// 熱門問題（模擬「底下列出常見問題，可跳過分層直達解答」的需求）
const HOT = [
  {biz:"企金", topic:"制裁名單與PEP政治人物", idx:0},
  {biz:"消金", topic:"疑似洗錢交易通報(STR)", idx:0},
  {biz:"企金", topic:"受益人辨識", idx:0},
  {biz:"消金", topic:"高風險客戶與國家", idx:0},
  {biz:"企金", topic:"跨境匯款相關", idx:0}
];

let stack = [{type:"home"}];

function push(entry){ stack.push(entry); render(); }
function goBack(){ if(stack.length>1){ stack.pop(); render(); } }
function resetTo(entries){ stack = entries; render(); }

function jumpToAnswer(biz, topic, idx){
  // 無論從哪個入口進來，一律確保 back 能一路退回「首頁 → 該業務主題列表 → 該主題問題列表」
  resetTo([
    {type:"home"},
    {type:"topics", biz},
    {type:"questions", biz, topic},
    {type:"answer", biz, topic, idx}
  ]);
}

function closeModal(){
  document.getElementById("modalLayer").innerHTML = "";
}

function openContactModal(){
  document.getElementById("modalLayer").innerHTML = `
    <div class="modal-mask">
      <div class="modal-box">
        <h4>聯絡法遵窗口</h4>
        <p>找不到您要的答案嗎？<br>請聯繫法遵部AML專責窗口：分機 1234<br>或內部信箱 aml-support@bank.internal</p>
        <button class="cta-btn modal-close" onclick="closeModal()">我知道了</button>
      </div>
    </div>`;
}

function render(){
  const cur = stack[stack.length-1];
  const app = document.getElementById("phone");
  const showBack = cur.type !== "home";
  const bizList = Object.keys(DB);

  let breadcrumb = "";
  if(cur.type==="topics") breadcrumb = cur.biz;
  if(cur.type==="questions") breadcrumb = cur.biz + " ／ " + cur.topic;
  if(cur.type==="answer") breadcrumb = cur.biz + " ／ " + cur.topic;

  let bodyHtml = "";

  if(cur.type==="home"){
    bodyHtml += `<div class="hint">點選下方業務類別，AML Buddy 為您解答 🙂</div>`;
    bodyHtml += `<div class="biz-grid">`;
    bizList.forEach(biz=>{
      const emo = biz==="企金" ? "🏢" : "🧑‍💼";
      bodyHtml += `<div class="biz-card" onclick='push({type:"topics",biz:"${biz}"})'>
        <span class="emo">${emo}</span>${biz}
      </div>`;
    });
    bodyHtml += `</div>`;
    bodyHtml += `<div class="card">
      <div class="card-title">❓ 您也許想問？</div>`;
    HOT.forEach(h=>{
      const item = DB[h.biz][h.topic][h.idx];
      bodyHtml += `<div class="list-item" onclick='jumpToAnswer("${h.biz}","${h.topic}",${h.idx})'>
        <span>${item.q}</span><span class="chev">›</span>
      </div>`;
    });
    bodyHtml += `</div>`;
    bodyHtml += `<div class="locked-note">🔒 本機器人僅提供既有選項點選，暫不支援自行輸入文字查詢</div>`;
  }

  if(cur.type==="topics"){
    const topics = Object.keys(DB[cur.biz]);
    bodyHtml += `<div class="hint">「${cur.biz}」相關的AML主題分類：</div>`;
    bodyHtml += `<div class="card">`;
    topics.forEach(t=>{
      bodyHtml += `<div class="list-item" onclick='push({type:"questions",biz:"${cur.biz}",topic:"${t}"})'>
        <span>${t}</span><span class="chev">›</span>
      </div>`;
    });
    bodyHtml += `</div>`;
  }

  if(cur.type==="questions"){
    const qs = DB[cur.biz][cur.topic];
    bodyHtml += `<div class="hint">「${cur.topic}」常見問題：</div>`;
    bodyHtml += `<div class="card">`;
    qs.forEach((item,idx)=>{
      bodyHtml += `<div class="list-item" onclick='push({type:"answer",biz:"${cur.biz}",topic:"${cur.topic}",idx:${idx}})'>
        <span>${item.q}</span><span class="chev">›</span>
      </div>`;
    });
    bodyHtml += `</div>`;
  }

  if(cur.type==="answer"){
    const item = DB[cur.biz][cur.topic][cur.idx];
    bodyHtml += `<div class="bubble-row"><div class="bubble-user">${item.q}</div></div>`;
    bodyHtml += `<div class="answer-card">${item.a}
      <div class="answer-ref">📄 內規依據：${item.ref}</div>
    </div>`;
    bodyHtml += `<button class="cta-btn" onclick='resetTo([{type:"home"},{type:"topics",biz:"${cur.biz}"}])'>🔄 重新選擇其他問題</button>`;
    bodyHtml += `<button class="cta-secondary" onclick="openContactModal()">還是找不到答案？聯絡法遵窗口</button>`;
  }

  app.innerHTML = `
    <div class="header">
      <div class="back-btn ${showBack?'show':''}" onclick="goBack()">‹</div>
      <div class="avatar">🤖</div>
      <div class="title-wrap">
        <div class="title">AML Buddy</div>
        ${breadcrumb ? `<div class="breadcrumb">${breadcrumb}</div>` : `<div class="breadcrumb">海外分行 / 子行 AML 知識小幫手</div>`}
      </div>
    </div>
    <div class="banner">💡 內容僅依據內規題庫回答，不會自行生成答案，如有疑義請至最新版內規或洽法遵單位確認</div>
    <div class="body" id="bodyArea">${bodyHtml}</div>
    <div class="footer">
      <div class="footer-title">快速提問（可直接點選，不需逐層點選）</div>
      <div class="chip-row">
        <div class="chip contact" onclick="openContactModal()">🎧 聯絡窗口</div>
        ${HOT.map(h=>`<div class="chip" onclick='jumpToAnswer("${h.biz}","${h.topic}",${h.idx})'>${DB[h.biz][h.topic][h.idx].q.length>10?DB[h.biz][h.topic][h.idx].q.slice(0,10)+"…":DB[h.biz][h.topic][h.idx].q}</div>`).join("")}
      </div>
    </div>
    <div id="modalLayer"></div>
  `;
}

render();
</script>
</body>
</html>
